# ==============================================================
# pdf_layout.ini  —  PDF座標定義ファイル（全5ページ対応）
# ==============================================================
#
# 書式:
#   キー名 = label_top=数値, page=ページ番号, tolerance=6, x0_min=最小X, x0_max=最大X, strip_suffix=除去文字列
#
# ★ page= は必ず指定（他ページの同座標データ混入防止）
# ★ strip_suffix= は末尾から除去する文字列（不要なら空欄のまま）
# ★ 「ラベル：値」形式のフィールドはコード側の after_colon() で値だけ取り出す
#
# ==============================================================


